<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Samuel Dashboard — 4 Color Snapshots</title>
  <style>
    body, html { margin: 0; padding: 0; background: #f4f4f3; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    /* Force the JetBrains Mono fallback chain to look reasonable when offline */
  </style>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="themes.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="phone.jsx"></script>
  <script type="text/babel" src="tab-training.jsx"></script>
  <script type="text/babel" src="tab-morgen.jsx"></script>
  <script type="text/babel" src="tab-others.jsx"></script>

  <script type="text/babel">
    const TAB_ORDER = [
      { id: 'train',    label: 'Training (hero)', active: 'train',    Comp: window.TrainingTab },
      { id: 'morgen',   label: 'Morgen',          active: 'morgen',   Comp: window.MorgenTab },
      { id: '75hard',   label: '75 Hard',         active: '75hard',   Comp: window.HardTab },
      { id: 'abend',    label: 'Abend',           active: 'abend',    Comp: window.AbendTab },
      { id: 'plan',     label: 'Plan',            active: 'plan',     Comp: window.PlanTab },
      { id: 'settings', label: 'Settings',        active: 'settings', Comp: window.SettingsTab },
    ];

    const SNAPSHOTS = [
      { id: 'steel', letter: 'A', theme: window.THEMES.steel },
      { id: 'gold',  letter: 'B', theme: window.THEMES.gold },
      { id: 'glass', letter: 'C', theme: window.THEMES.glass },
      { id: 'teal',  letter: 'D', theme: window.THEMES.teal },
    ];

    function PhoneArtboard({ theme, tabId, active, Comp }) {
      return (
        <window.Phone t={theme} active={active}>
          <Comp t={theme}/>
        </window.Phone>
      );
    }

    function App() {
      return (
        <window.DesignCanvas>
          {SNAPSHOTS.map(snap => (
            <window.DCSection
              key={snap.id}
              id={snap.id}
              title={`${snap.letter} · ${snap.theme.name}`}
              subtitle={snap.theme.tagline}
            >
              {TAB_ORDER.map(tab => (
                <window.DCArtboard
                  key={`${snap.id}-${tab.id}`}
                  id={`${snap.id}-${tab.id}`}
                  label={tab.label}
                  width={402}
                  height={874}
                  style={{ background: 'transparent' }}
                >
                  <PhoneArtboard
                    theme={snap.theme}
                    tabId={tab.id}
                    active={tab.active}
                    Comp={tab.Comp}
                  />
                </window.DCArtboard>
              ))}
            </window.DCSection>
          ))}
        </window.DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
